name: Apply Content and Internal Link Patch

on:
  push:
    branches:
      - fix/dependency-security-upgrades-20260710

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout content branch
        uses: actions/checkout@v4
        with:
          ref: fix/dependency-security-upgrades-20260710

      - name: Apply privacy and SEO content patch
        shell: bash
        run: |
          base64 -d scripts/privacy-seo.patch.gz.b64 | gzip -d > /tmp/privacy-seo.patch
          git apply --check /tmp/privacy-seo.patch
          git apply /tmp/privacy-seo.patch

      - name: Commit content changes
        shell: bash
        run: |
          if git diff --quiet -- app/[locale]/privacy/page.tsx lib/seo-landing-content.ts; then
            echo "Content patch already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/[locale]/privacy/page.tsx lib/seo-landing-content.ts
          git commit -m "content(seo): add low-end PC browser games guide and repair links"
          git push origin HEAD:fix/dependency-security-upgrades-20260710
