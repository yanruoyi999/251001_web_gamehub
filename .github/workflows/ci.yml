name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Smoke check
        run: |
          echo "Repository checked out successfully. Full Next.js build validation runs in Vercel preview deployments."
          git status --short
