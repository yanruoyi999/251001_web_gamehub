name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Verify runtime
        run: |
          node --version
          npm --version
          npx --yes pnpm@9 --version

      - name: Install dependencies
        run: npx --yes pnpm@9 install --frozen-lockfile

      - name: Lint
        run: npx --yes pnpm@9 lint

      - name: Type check
        run: npx --yes pnpm@9 type-check

      - name: Unit tests
        run: npx --yes pnpm@9 test
        env:
          NODE_ENV: test
