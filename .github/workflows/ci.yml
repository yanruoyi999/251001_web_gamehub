name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    container: node:22-bookworm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Verify runtime
        run: |
          node --version
          npm --version
          npx pnpm@9 --version

      - name: Install dependencies
        run: npx pnpm@9 install --frozen-lockfile

      - name: Lint
        run: npx pnpm@9 lint

      - name: Type check
        run: npx pnpm@9 type-check

      - name: Unit tests
        run: npx pnpm@9 test
        env:
          NODE_ENV: test
