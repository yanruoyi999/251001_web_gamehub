name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Regenerate lockfile for patched Next.js
        run: pnpm install --no-frozen-lockfile

      - name: Commit regenerated lockfile
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: refresh lockfile for Next.js 15.5.21"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

      - name: Internal link audit
        id: internal_links
        shell: bash
        run: |
          set -o pipefail
          pnpm check:internal-links 2>&1 | tee internal-link-output.txt

      - name: Upload internal link diagnostics
        if: failure() && steps.internal_links.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: internal-link-diagnostics
          if-no-files-found: error
          retention-days: 3
          path: internal-link-output.txt

      - name: Unit tests
        id: unit_tests
        shell: bash
        run: |
          set -o pipefail
          pnpm test -- --run 2>&1 | tee test-output.txt
        env:
          NODE_ENV: test

      - name: Upload unit test diagnostics
        if: failure() && steps.unit_tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-diagnostics
          if-no-files-found: error
          retention-days: 3
          path: test-output.txt

      - name: Audit production dependencies
        id: dependency_audit
        shell: bash
        run: |
          set -o pipefail
          pnpm audit:prod 2>&1 | tee dependency-audit-output.txt

      - name: Upload dependency audit diagnostics
        if: failure() && steps.dependency_audit.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-diagnostics
          if-no-files-found: error
          retention-days: 7
          path: dependency-audit-output.txt

      - name: Production build
        run: pnpm build
