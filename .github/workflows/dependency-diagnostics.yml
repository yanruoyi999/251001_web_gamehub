name: Dependency Migration Diagnostics

on:
  pull_request:
    branches:
      - fix/full-code-audit-20260710

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capture lint output
        shell: bash
        run: |
          set +e
          pnpm lint > dependency-lint.txt 2>&1
          echo $? > dependency-lint-exit.txt
          set -e

      - name: Capture type-check output
        shell: bash
        run: |
          set +e
          pnpm type-check > dependency-typecheck.txt 2>&1
          echo $? > dependency-typecheck-exit.txt
          set -e

      - name: Capture production build output
        shell: bash
        run: |
          set +e
          pnpm build > dependency-build.txt 2>&1
          echo $? > dependency-build-exit.txt
          set -e

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: dependency-migration-diagnostics
          retention-days: 1
          path: |
            dependency-lint.txt
            dependency-lint-exit.txt
            dependency-typecheck.txt
            dependency-typecheck-exit.txt
            dependency-build.txt
            dependency-build-exit.txt
