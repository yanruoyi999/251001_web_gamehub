name: Dependency Lock Refresh

on:
  push:
    branches:
      - fix/dependency-security-upgrades-20260710

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dependency branch
        uses: actions/checkout@v4
        with:
          ref: fix/dependency-security-upgrades-20260710

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm@10.28.0

      - name: Resolve patched dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Commit lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): refresh PostCSS override lockfile"
          git push origin HEAD:fix/dependency-security-upgrades-20260710
