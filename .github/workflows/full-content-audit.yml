name: Full Content Audit Snapshot

on:
  push:
    branches:
      - fix/dependency-security-upgrades-20260710

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: fix/dependency-security-upgrades-20260710

      - name: Build page and link inventory
        shell: bash
        run: |
          find app -type f -name 'page.tsx' | sort > page-files.txt
          grep -RInE "href=|getLocalizedPath\(|router\.push\(|redirect\(" app components lib \
            --include='*.ts' --include='*.tsx' 2>/dev/null > internal-link-signals.txt || true
          grep -RInE 'TODO|FIXME|HACK|XXX|as any|@ts-ignore|dangerouslySetInnerHTML|http://' \
            app components lib services db i18n scripts types \
            --include='*.ts' --include='*.tsx' --include='*.js' --include='*.mjs' \
            2>/dev/null > code-signals.txt || true

      - name: Upload current source snapshot
        uses: actions/upload-artifact@v4
        with:
          name: full-content-audit-snapshot
          retention-days: 1
          if-no-files-found: error
          path: |
            page-files.txt
            internal-link-signals.txt
            code-signals.txt
            app
            components
            lib
            services
            db
            i18n
            scripts
            types
            public/data/4399-sample.json
            package.json
            pnpm-lock.yaml
            tsconfig.json
            next.config.js
            middleware.ts
